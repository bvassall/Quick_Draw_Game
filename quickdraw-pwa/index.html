<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quick Draw — Dead or Alive</title>

<!-- PWA -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quick Draw">
<meta name="theme-color" content="#8b6340">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Rye&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--dust:#c8a96e;--dirt:#8b6340;--blood:#8b0000;--parchment:#f5e6c8;--ink:#2a1a0a;--gold:#d4a017;}
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;font-family:'Teko',sans-serif;background:linear-gradient(180deg,#c27842 0%,#8b6340 40%,#6b4c2a 100%);cursor:none;user-select:none;height:100vh;width:100vw;
  /* iPhone notch / home bar safe areas */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
/* Hide cursor on touch screens */
@media (hover: none) { #cursor { display: none; } }
/* Bigger tap targets for stick figures on mobile */
@media (max-width: 768px) {
  .stick { width: 110px; height: 140px; }
  #scoreNum { font-size: 38px; }
  #streakNum { font-size: 44px; }
  #drawText { font-size: 72px; }
  #bossWarn span { font-size: 44px; }
  .callout { font-size: calc(var(--fs) * 0.75) !important; }
  #shopInner { min-width: unset; width: 92vw; padding: 20px; }
  .shopItems { grid-template-columns: 1fr; }
}

#cursor{position:fixed;width:36px;height:36px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cursor.fired{transform:translate(-50%,-50%) scale(1.6);}
#cursor svg{width:100%;height:100%;}

#ground{position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(180deg,#8b6340,#5a3a1a);border-top:4px solid #a0722a;}
#ground::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='20' viewBox='0 0 60 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10 Q15 4 30 10 Q45 16 60 10' stroke='%23a0722a' stroke-width='1.5' fill='none' opacity='0.4'/%3E%3C/svg%3E");opacity:0.4;}
#sun{position:absolute;top:40px;right:120px;width:70px;height:70px;background:radial-gradient(circle,#ffe066,#f0a020);border-radius:50%;box-shadow:0 0 40px 20px rgba(255,200,50,0.3);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 40px 20px rgba(255,200,50,0.3)}50%{box-shadow:0 0 60px 30px rgba(255,200,50,0.5)}}
#silhouettes{position:absolute;bottom:30%;left:0;right:0;height:160px;opacity:0.35;}
#bloodCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:10;}

#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 20px;pointer-events:none;z-index:100;}
#scoreBox{background:rgba(20,10,0,0.75);border:2px solid var(--gold);padding:8px 18px 4px;text-align:center;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
#scoreLabel{font-family:'Rye';font-size:11px;color:var(--gold);letter-spacing:2px;}
#scoreNum{font-size:52px;color:var(--parchment);line-height:1;font-weight:700;}
#streakBox{text-align:center;}
#streakLabel{font-family:'Rye';font-size:11px;color:var(--gold);letter-spacing:2px;}
#streakNum{font-size:60px;color:#ff6633;line-height:1;font-weight:700;text-shadow:0 0 20px #ff4400;transition:color .3s;}
#multiplierTag{font-size:18px;color:var(--gold);}
#livesBox{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
#livesLabel{font-family:'Rye';font-size:11px;color:var(--gold);letter-spacing:2px;}
#hearts{display:flex;gap:6px;}
.heart{font-size:28px;transition:all .3s;filter:drop-shadow(0 0 4px rgba(255,0,0,.5));}
.heart.dead{opacity:.2;filter:grayscale(1);}
#waveDisplay{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Rye';font-size:13px;color:var(--parchment);background:rgba(20,10,0,.6);border:1px solid var(--gold);padding:4px 16px;letter-spacing:2px;z-index:100;}

#xpBarWrap{position:absolute;bottom:31%;left:0;right:0;height:18px;z-index:100;display:flex;align-items:center;}
#rankTag{font-family:'Rye';font-size:10px;color:var(--gold);padding:0 10px;letter-spacing:1px;white-space:nowrap;background:rgba(20,10,0,.5);}
#xpBar{flex:1;height:6px;background:rgba(0,0,0,.4);}
#xpFill{height:100%;background:linear-gradient(90deg,var(--gold),#ff8800);width:0%;transition:width .5s ease;}

#comboMeter{position:absolute;bottom:calc(30% + 28px);left:50%;transform:translateX(-50%);pointer-events:none;z-index:100;text-align:center;}
.comboBar{width:200px;height:5px;background:rgba(0,0,0,.4);border:1px solid var(--gold);border-radius:3px;overflow:hidden;margin:0 auto;}
.comboFill{height:100%;background:linear-gradient(90deg,var(--gold),#ff6600);width:100%;}
.comboText{font-family:'Rye';font-size:10px;color:var(--gold);letter-spacing:2px;margin-top:2px;}

#bulletTimeOverlay{position:fixed;inset:0;pointer-events:none;z-index:490;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,20,60,.6) 100%);transition:opacity .25s;}
#bulletTimeOverlay.active{opacity:1;}

#drawOverlay{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s;}
#drawText{font-family:'Rye';font-size:110px;color:#fff;text-shadow:0 0 40px #ff6600,4px 4px 0 #8b0000;animation:drawPop .35s forwards;}
@keyframes drawPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

.taunt{position:absolute;background:var(--parchment);border:2px solid var(--ink);padding:3px 8px;font-family:'Rye';font-size:9px;color:var(--ink);border-radius:6px;white-space:nowrap;pointer-events:none;z-index:150;top:-36px;left:50%;transform:translateX(-50%);animation:tauntPop .2s forwards;}
.taunt::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--ink);}
@keyframes tauntPop{from{transform:translateX(-50%) scale(.8);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

#shop{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.72);align-items:center;justify-content:center;}
#shop.show{display:flex;}
#shopInner{background:var(--parchment);border:6px double var(--ink);padding:28px 36px;text-align:center;min-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.8);}
#shopInner h2{font-family:'Rye';font-size:32px;color:var(--blood);margin-bottom:4px;}
#shopSub{font-family:'Rye';font-size:11px;color:var(--dirt);letter-spacing:2px;margin-bottom:14px;}
#shopGold{font-size:28px;color:var(--ink);margin-bottom:16px;font-weight:700;}
.shopItems{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.shopItem{background:rgba(139,99,64,.15);border:2px solid var(--dirt);padding:10px;cursor:pointer;transition:all .15s;}
.shopItem:hover:not(.bought){background:rgba(139,99,64,.35);transform:scale(1.03);}
.shopItem.bought{opacity:.4;pointer-events:none;}
.shopItem.unaffordable{opacity:.5;}
.iName{font-family:'Rye';font-size:12px;color:var(--ink);}
.iDesc{font-size:13px;color:#666;margin:3px 0;}
.iCost{font-size:20px;font-weight:700;color:var(--blood);}
#shopContinue{font-family:'Rye';font-size:18px;background:var(--blood);color:var(--parchment);border:none;padding:12px 32px;cursor:pointer;letter-spacing:3px;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);}
#shopContinue:hover{background:#aa0000;}

#gameOver{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--parchment);border:6px double var(--ink);padding:28px 40px;text-align:center;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.8),inset 0 0 40px rgba(139,100,60,.3);min-width:320px;}
#gameOver::before{content:'WANTED';font-family:'Rye';font-size:12px;letter-spacing:8px;color:var(--dirt);display:block;margin-bottom:4px;}
#gameOver h1{font-family:'Rye';font-size:52px;color:var(--blood);line-height:1;}
.goRank{font-family:'Rye';font-size:18px;color:var(--dirt);margin:5px 0;}
.goFinal{font-size:36px;color:var(--ink);margin:5px 0 2px;font-weight:700;}
.goLabel{font-family:'Rye';font-size:11px;color:var(--dirt);letter-spacing:3px;margin-bottom:10px;}
.goStreak{font-size:18px;color:var(--dirt);margin-bottom:10px;}
#lbTitle{font-family:'Rye';font-size:12px;color:var(--dirt);letter-spacing:2px;margin-bottom:4px;border-top:2px solid var(--dirt);padding-top:8px;}
#lbList{font-size:20px;color:var(--ink);line-height:1.6;margin-bottom:14px;}
#restartBtn{font-family:'Rye';font-size:18px;background:var(--blood);color:var(--parchment);border:none;padding:12px 32px;cursor:pointer;letter-spacing:3px;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);}
#restartBtn:hover{background:#aa0000;}

.stick{position:absolute;width:90px;height:120px;cursor:none;}
.player{top:50%;left:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 10px 8px rgba(0,0,0,.5));}
svg{width:100%;height:100%;}
.arm{transform-origin:40px 35px;}
.gun{opacity:1;}
.shooting .gun{animation:gunFlash .08s alternate 4;}
@keyframes gunFlash{from{filter:brightness(4) drop-shadow(0 0 8px #ffdd00)}to{filter:brightness(1)}}
#aimArm2{display:none;}

.enemy-slow>svg>circle,.enemy-slow>svg>line,.enemy-slow .arm>line{stroke:#cc8833!important;}
.enemy-fast>svg>circle,.enemy-fast>svg>line,.enemy-fast .arm>line{stroke:#dd3333!important;}
.enemy-elite>svg>circle,.enemy-elite>svg>line,.enemy-elite .arm>line{stroke:#9933cc!important;}
.enemy-elite{filter:drop-shadow(0 0 8px rgba(150,50,200,.8));}
.enemy-boss>svg>circle,.enemy-boss>svg>line,.enemy-boss .arm>line{stroke:#ff6600!important;}
.enemy-boss{filter:drop-shadow(0 0 14px rgba(255,100,0,.9));transform:scale(1.28);transform-origin:center bottom;}

.dead{animation:die .4s forwards;}
@keyframes die{0%{transform:rotate(0) scale(1);opacity:1}100%{transform:rotate(90deg) scale(.8);opacity:0}}
.playerDead{animation:playerFall .5s forwards;}
@keyframes playerFall{100%{transform:translate(-50%,-50%) rotate(-90deg);opacity:.5}}
@keyframes slideInL{from{transform:translateX(-120px);opacity:0}to{opacity:1}}
@keyframes slideInR{from{transform:translateX(120px);opacity:0}to{opacity:1}}
.sil{animation:slideInL .3s forwards;}
.sir{animation:slideInR .3s forwards;}

#screenFlash{position:fixed;inset:0;pointer-events:none;z-index:500;opacity:0;background:white;}
#screenRed{position:fixed;inset:0;pointer-events:none;z-index:499;opacity:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(180,0,0,.6) 100%);}

.dust{position:absolute;border-radius:50%;pointer-events:none;animation:dustFly var(--dur,.6s) forwards;z-index:50;}
@keyframes dustFly{0%{opacity:.8;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx,20px),var(--ty,-30px)) scale(.2)}}
.muzzle{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,#ffdd00,transparent);pointer-events:none;animation:muzzlePop .12s forwards;z-index:200;}
@keyframes muzzlePop{0%{opacity:1;transform:scale(.5)}50%{opacity:1;transform:scale(2.2)}100%{opacity:0;transform:scale(.8)}}

#floaters{position:absolute;inset:0;pointer-events:none;z-index:200;}
.callout{position:absolute;font-family:'Rye';pointer-events:none;font-size:var(--fs,32px);color:var(--col,#ffd700);text-shadow:2px 2px 0 rgba(0,0,0,.5),0 0 20px var(--glow,#ff8800);animation:calloutAnim .9s forwards;white-space:nowrap;z-index:300;}
@keyframes calloutAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.5) rotate(-5deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(3deg)}60%{opacity:1;transform:translate(-50%,-60%) scale(1) rotate(0)}100%{opacity:0;transform:translate(-50%,-80%) scale(.9)}}
.rfloat{position:absolute;font-family:'Teko';font-size:16px;font-weight:600;color:var(--parchment);pointer-events:none;animation:riseF 1.2s forwards;z-index:250;text-shadow:1px 1px 2px rgba(0,0,0,.8);}
@keyframes riseF{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}

.healthBar{position:absolute;top:-10px;left:5px;right:5px;height:4px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden;}
.healthFill{height:100%;background:linear-gradient(90deg,#ff3300,#ffaa00);transition:width .1s;}
.bountyTag{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:var(--parchment);border:1px solid var(--ink);font-family:'Rye';font-size:9px;color:var(--blood);padding:1px 5px;white-space:nowrap;pointer-events:none;}

#upgradeHUD{position:absolute;bottom:calc(30% + 22px);right:14px;display:flex;gap:5px;z-index:100;pointer-events:none;}
.upgIcon{width:26px;height:26px;background:rgba(20,10,0,.7);border:1px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.35;transition:opacity .3s;}
.upgIcon.on{opacity:1;box-shadow:0 0 8px var(--gold);}

#bossWarn{position:fixed;inset:0;pointer-events:none;z-index:700;display:flex;align-items:center;justify-content:center;opacity:0;}
#bossWarn.flash{animation:bossFlash 1.4s forwards;}
@keyframes bossFlash{0%,100%{opacity:0}15%,45%,75%{opacity:1}30%,60%{opacity:.3}}
#bossWarn span{font-family:'Rye';font-size:68px;color:#ff4400;text-shadow:0 0 40px #ff0000,4px 4px 0 #400;}

#dailyBadge{position:absolute;top:80px;right:14px;background:rgba(20,10,0,.75);border:1px solid var(--gold);padding:3px 9px;font-family:'Rye';font-size:10px;color:var(--gold);letter-spacing:1px;z-index:100;}
</style>
</head>
<body>

<div id="cursor">
  <svg viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="15" stroke="#fff" stroke-width="1.5" stroke-dasharray="4 3" opacity=".9"/>
    <circle cx="18" cy="18" r="4" stroke="#fff" stroke-width="1.5"/>
    <line x1="18" y1="2" x2="18" y2="9" stroke="#fff" stroke-width="1.5"/>
    <line x1="18" y1="27" x2="18" y2="34" stroke="#fff" stroke-width="1.5"/>
    <line x1="2" y1="18" x2="9" y2="18" stroke="#fff" stroke-width="1.5"/>
    <line x1="27" y1="18" x2="34" y2="18" stroke="#fff" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="2" fill="#ff3300"/>
  </svg>
</div>

<div id="sun"></div>
<svg id="silhouettes" viewBox="0 0 1400 160" preserveAspectRatio="none">
  <polygon points="0,160 80,60 160,110 250,30 350,90 420,20 500,80 580,50 680,120 760,40 860,100 960,20 1060,80 1150,45 1260,95 1350,30 1400,70 1400,160" fill="#5a3a1a"/>
  <rect x="200" y="70" width="30" height="90" fill="#5a3a1a"/><rect x="185" y="68" width="60" height="15" fill="#5a3a1a"/>
  <rect x="900" y="55" width="25" height="105" fill="#5a3a1a"/><rect x="888" y="53" width="50" height="12" fill="#5a3a1a"/>
</svg>
<div id="ground"></div>
<canvas id="bloodCanvas"></canvas>

<div id="hud">
  <div id="scoreBox"><div id="scoreLabel">BOUNTY</div><div id="scoreNum">0</div></div>
  <div id="waveDisplay">ROUND 1</div>
  <div id="streakBox"><div id="streakLabel">STREAK</div><div id="streakNum">0</div><div id="multiplierTag">x1</div></div>
  <div id="livesBox"><div id="livesLabel">LIVES</div><div id="hearts"></div></div>
</div>
<div id="xpBarWrap"><div id="rankTag">GREENHORN</div><div id="xpBar"><div id="xpFill"></div></div></div>
<div id="comboMeter"><div class="comboBar"><div class="comboFill" id="comboFill"></div></div><div class="comboText">COMBO</div></div>
<div id="upgradeHUD">
  <div class="upgIcon" id="u-dual">🔫</div>
  <div class="upgIcon" id="u-shield">🛡</div>
  <div class="upgIcon" id="u-time">⏱</div>
  <div class="upgIcon" id="u-bounty">💰</div>
</div>
<div id="dailyBadge">📅 DAILY</div>
<div id="floaters"></div>
<div id="bulletTimeOverlay"></div>
<div id="drawOverlay"><div id="drawText">DRAW!</div></div>
<div id="bossWarn"><span>⚠ BOSS INCOMING ⚠</span></div>
<div id="screenFlash"></div>
<div id="screenRed"></div>

<!-- Player -->
<div class="stick player" id="player">
<svg viewBox="0 0 80 100">
  <circle cx="25" cy="14" r="10" stroke="#2a1a0a" stroke-width="3" fill="none"/>
  <line x1="25" y1="24" x2="25" y2="62" stroke="#2a1a0a" stroke-width="3"/>
  <g id="aimArm" style="transform-origin:25px 35px">
    <line x1="25" y1="35" x2="44" y2="48" stroke="#2a1a0a" stroke-width="3"/>
    <g class="gun" transform="translate(44,48)">
      <rect x="-3" y="-2" width="7" height="11" rx="2" fill="#5a3010" stroke="#2a1a0a" stroke-width="1.2"/>
      <path d="M1,6 Q6,9 4,13 Q2,14 1,13" fill="none" stroke="#2a1a0a" stroke-width="1.2"/>
      <line x1="2" y1="6" x2="3" y2="10" stroke="#2a1a0a" stroke-width="1"/>
      <ellipse cx="5" cy="1" rx="5" ry="4" fill="#555" stroke="#2a1a0a" stroke-width="1.2"/>
      <line x1="2" y1="-2" x2="2" y2="4" stroke="#888" stroke-width=".6"/>
      <line x1="5" y1="-3" x2="5" y2="5" stroke="#888" stroke-width=".6"/>
      <line x1="8" y1="-2" x2="8" y2="4" stroke="#888" stroke-width=".6"/>
      <rect x="8" y="-2" width="22" height="4" rx="1.5" fill="#333" stroke="#2a1a0a" stroke-width="1.2"/>
      <line x1="9" y1="-2" x2="30" y2="-2" stroke="#555" stroke-width=".8"/>
      <rect x="28" y="-3" width="4" height="6" rx="1" fill="#222" stroke="#2a1a0a" stroke-width="1"/>
      <rect x="-1" y="-6" width="4" height="5" rx="1" fill="#444" stroke="#2a1a0a" stroke-width="1"/>
    </g>
  </g>
  <g id="aimArm2" style="transform-origin:25px 35px">
    <line x1="25" y1="35" x2="6" y2="48" stroke="#2a1a0a" stroke-width="3"/>
    <g class="gun" transform="translate(6,48) scale(-1,1)">
      <rect x="-3" y="-2" width="7" height="11" rx="2" fill="#5a3010" stroke="#2a1a0a" stroke-width="1.2"/>
      <ellipse cx="5" cy="1" rx="5" ry="4" fill="#555" stroke="#2a1a0a" stroke-width="1.2"/>
      <rect x="8" y="-2" width="22" height="4" rx="1.5" fill="#333" stroke="#2a1a0a" stroke-width="1.2"/>
      <rect x="28" y="-3" width="4" height="6" rx="1" fill="#222" stroke="#2a1a0a" stroke-width="1"/>
      <rect x="-1" y="-6" width="4" height="5" rx="1" fill="#444" stroke="#2a1a0a" stroke-width="1"/>
    </g>
  </g>
  <line x1="25" y1="62" x2="10" y2="92" stroke="#2a1a0a" stroke-width="3"/>
  <line x1="25" y1="62" x2="40" y2="92" stroke="#2a1a0a" stroke-width="3"/>
</svg>
</div>

<!-- Shop -->
<div id="shop">
  <div id="shopInner">
    <h2>🏪 GENERAL STORE</h2>
    <div id="shopSub">SPEND YER BOUNTY, PARTNER</div>
    <div id="shopGold">💰 <span id="shopGoldAmt">0</span></div>
    <div class="shopItems" id="shopItems"></div>
    <button id="shopContinue" onclick="closeShop()">HIT THE TRAIL →</button>
  </div>
</div>

<!-- Game Over -->
<div id="gameOver">
  <h1>DEAD</h1>
  <div class="goRank" id="goRank"></div>
  <div class="goFinal" id="goFinal">0</div>
  <div class="goLabel">BOUNTY COLLECTED</div>
  <div class="goStreak" id="goStreak"></div>
  <div id="lbTitle">TOP OUTLAWS</div>
  <div id="lbList"></div>
  <button id="restartBtn" onclick="restart()">DRAW AGAIN</button>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
let score=0, lives=3, streak=0, bestStreak=0, multiplier=1;
let gameOver=false, inShop=false, bulletTimeActive=false, btCooldown=false;
let spawnInterval=null, comboTimer=null;
let round=1, killsThisRound=0;
let xp=0, rankIdx=0;
const activeEnemies=new Set();
const boughtItems=new Set();
const upgrades={dual:false,shield:false,time:false,bounty:false,streakKeep:false};
const COMBO_DURATION=3000;

const RANKS=[
  {name:"GREENHORN",xp:0},{name:"COWPOKE",xp:150},{name:"GUNSLINGER",xp:350},
  {name:"DESPERADO",xp:700},{name:"OUTLAW",xp:1200},{name:"DEAD EYE",xp:2000},{name:"LEGEND",xp:3500},
];
const TAUNTS=["Yer slow, partner…","Draw, coward!","This town ain't big enough…",
  "I've shot faster men.","Say yer prayers.","Feeling lucky?","Adios, amigo.","I won't miss.","Blink and yer dead."];

function paintBlood(x,y){
  for(let i=0;i<8+Math.floor(Math.random()*6);i++){
    const r=3+Math.random()*9, a=Math.random()*Math.PI*2, d=Math.random()*24;
    bCtx.beginPath();
    bCtx.arc(x+Math.cos(a)*d,y+Math.sin(a)*d,r,0,Math.PI*2);
    bCtx.fillStyle=`rgba(${100+Math.floor(Math.random()*50)},0,0,${.35+Math.random()*.45})`;
    bCtx.fill();
  }
}

// ── AUDIO ──────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
let musicTimer=null, musicTick=0;

function tone(freq,type,vol,dur,delay=0){
  const t=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur);
}
function playSound(type){
  AC.resume();
  const t=AC.currentTime;
  if(type==="shot"){
    tone(150,"square",.28,.18); tone(900,"sawtooth",.1,.04);
  } else if(type==="headshot"){
    tone(1400,"sawtooth",.18,.35);
  } else if(type==="hurt"){
    tone(250,"sawtooth",.32,.35);
    const o=AC.createOscillator(),g=AC.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(250,t); o.frequency.exponentialRampToValueAtTime(60,t+.35);
    g.gain.setValueAtTime(.32,t); g.gain.exponentialRampToValueAtTime(.001,t+.35);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+.35);
    return;
  } else if(type==="combo"){
    const f=[330,440,550,660,880,1100][Math.min(streak-1,5)];
    tone(f,"triangle",.12,.25);
  } else if(type==="die"){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type="square"; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(40,t+.8);
    g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.8);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+.8); return;
  } else if(type==="shop"){
    [440,550,660,880].forEach((f,i)=>tone(f,"triangle",.1,.25,i*.1));
  } else if(type==="levelup"){
    [440,550,660,880].forEach((f,i)=>tone(f,"triangle",.1,.25,i*.08));
  } else if(type==="boss"){
    tone(60,"sawtooth",.25,.8);
  }
}

function tickMusic(){
  if(gameOver||inShop){musicTimer=null;return;}
  const bps=Math.min(3.2,(80+streak*9)/60);
  musicTick++;
  // kick
  const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type="sine"; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(30,t+.14);
  g.gain.setValueAtTime(streak>4?.2:.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.14);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+.14);
  // hihat at higher streaks
  if(streak>3){
    const ht=t+.5/bps;
    const buf=AC.createBuffer(1,AC.sampleRate*.05,AC.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.3;
    const src=AC.createBufferSource(),hg=AC.createGain();
    hg.gain.setValueAtTime(.07,ht); hg.gain.exponentialRampToValueAtTime(.001,ht+.04);
    src.buffer=buf; src.connect(hg); hg.connect(AC.destination); src.start(ht);
  }
  musicTimer=setTimeout(tickMusic,1000/bps);
}
function startMusic(){if(!musicTimer)tickMusic();}

// ── SCREEN FX ──────────────────────────────────────────
function screenShake(i=5,dur=200){
  const s=Date.now(),iv=setInterval(()=>{
    if(Date.now()-s>dur){document.body.style.transform="";clearInterval(iv);return;}
    document.body.style.transform=`translate(${(Math.random()-.5)*i*2}px,${(Math.random()-.5)*i*2}px)`;
  },16);
}
function flash(col,op,dur){
  const el=col==="red"?screenRed:screenFlash;
  el.style.opacity=op; el.style.transition="none";
  requestAnimationFrame(()=>{el.style.transition=`opacity ${dur}ms`;el.style.opacity=0;});
}
function spawnDust(x,y,n=8,col="#c8a96e"){
  for(let i=0;i<n;i++){
    const d=document.createElement("div"); d.className="dust";
    const sz=4+Math.random()*8;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;background:${col};--tx:${(Math.random()-.5)*60}px;--ty:${-20-Math.random()*40}px;--dur:${.4+Math.random()*.4}s`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),900);
  }
}
function spawnMuzzle(x,y){
  const m=document.createElement("div"); m.className="muzzle";
  m.style.cssText=`width:24px;height:24px;left:${x-12}px;top:${y-12}px`;
  document.body.appendChild(m); setTimeout(()=>m.remove(),200);
}
function callout(txt,x,y,opts={}){
  const c=document.createElement("div"); c.className="callout"; c.textContent=txt;
  c.style.cssText=`left:${x}px;top:${y}px;--fs:${opts.size||"32px"};--col:${opts.color||"#ffd700"};--glow:${opts.glow||"#ff8800"}`;
  floaters.appendChild(c); setTimeout(()=>c.remove(),1000);
}
function rfloat(txt,x,y){
  const r=document.createElement("div"); r.className="rfloat"; r.textContent=txt;
  r.style.cssText=`left:${x}px;top:${y}px`; floaters.appendChild(r); setTimeout(()=>r.remove(),1300);
}

// ── BULLET TIME ────────────────────────────────────────
function triggerBulletTime(){
  if(btCooldown||bulletTimeActive||!upgrades.time) return;
  bulletTimeActive=true; btCooldown=true;
  btOverlay.classList.add("active");
  callout("BULLET TIME",window.innerWidth/2,window.innerHeight/2,{size:"44px",color:"#88ccff",glow:"#0088ff"});
  setTimeout(()=>{
    bulletTimeActive=false; btOverlay.classList.remove("active");
    document.getElementById("u-time").style.opacity=".2";
    setTimeout(()=>{btCooldown=false;document.getElementById("u-time").style.opacity="1";},8000);
  },2500);
}

// ── DRAW COUNTDOWN ─────────────────────────────────────
function showDraw(cb){
  const steps=["3","2","1","DRAW!"];
  let i=0;
  drawOverlay.style.opacity=1;
  function next(){
    if(i>=steps.length){drawOverlay.style.opacity=0;cb();return;}
    drawText.textContent=steps[i];
    drawText.style.animation="none";
    requestAnimationFrame(()=>{drawText.style.animation="drawPop .35s forwards";});
    if(steps[i]==="DRAW!"){playSound("shot");setTimeout(()=>{drawOverlay.style.opacity=0;cb();},700);}
    else setTimeout(next,550);
    i++;
  }
  next();
}

// ── XP / RANK ──────────────────────────────────────────
function addXP(amt){
  xp+=amt;
  const next=RANKS[rankIdx+1];
  if(next&&xp>=next.xp){
    rankIdx++;
    rankTag.textContent=RANKS[rankIdx].name;
    playSound("levelup");
    callout("RANK UP: "+RANKS[rankIdx].name,window.innerWidth/2,window.innerHeight/3,{size:"34px",color:"#ffd700",glow:"#ffaa00"});
  }
  const cur=RANKS[rankIdx].xp;
  const nxt=(RANKS[rankIdx+1]||{xp:xp+1}).xp;
  xpFill.style.width=Math.min(100,(xp-cur)/(nxt-cur)*100)+"%";
  rankTag.textContent=RANKS[rankIdx].name;
}

// ── COMBO ──────────────────────────────────────────────
function resetCombo(){
  streak=0; multiplier=1;
  streakNum.textContent="0"; multiplierTag.textContent="x1";
  streakNum.style.color="#ff6633"; comboFill.style.width="100%";
  clearTimeout(comboTimer);
}
function addStreak(x,y){
  streak++; bestStreak=Math.max(bestStreak,streak);
  multiplier=Math.min(10,1+Math.floor(streak/3));
  streakNum.textContent=streak; multiplierTag.textContent="x"+multiplier;
  streakNum.style.color=`hsl(${Math.max(0,60-streak*4)},100%,55%)`;
  if(streak===3)  callout("HOT SHOT!",x,y,{size:"28px"});
  else if(streak===5)  callout("ON FIRE!",x,y,{size:"36px",color:"#ff4400",glow:"#ff2200"});
  else if(streak===8)  callout("UNSTOPPABLE!",x,y,{size:"40px",color:"#ff2200",glow:"#ff0000"});
  else if(streak===12) callout("LEGENDARY!",x,y,{size:"48px",color:"#fff",glow:"#ffdd00"});
  else if(streak===20) callout("G O D L I K E",x,y,{size:"54px",color:"#ffdd00",glow:"#ffffff"});
  if(streak===10&&upgrades.dual){
    aimArm2.style.display="block";
    callout("DUAL WIELD!",x,y,{size:"32px",color:"#88ffdd",glow:"#00ffaa"});
  }
  if(streak>=3) playSound("combo");
  clearTimeout(comboTimer);
  comboFill.style.transition="none"; comboFill.style.width="100%";
  comboTimer=setTimeout(resetCombo,COMBO_DURATION);
  requestAnimationFrame(()=>{comboFill.style.transition=`width ${COMBO_DURATION}ms linear`;comboFill.style.width="0%";});
  startMusic();
}

// ── GEOMETRY ───────────────────────────────────────────
function angleTo(f,t){return Math.atan2(t.y-f.y,t.x-f.x)*180/Math.PI;}
function smoothRotate(arm,target){
  arm._a=arm._a||0;
  const diff=((target-arm._a+540)%360)-180;
  arm._a+=diff*.22;
  arm.style.transform=`rotate(${arm._a}deg)`;
}
function center(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}

// ── GUN INNER SVG ──────────────────────────────────────
function gunInner(col){
  return `<rect x="-3" y="-2" width="7" height="11" rx="2" fill="#5a3010" stroke="${col}" stroke-width="1.2"/>
    <path d="M1,6 Q6,9 4,13 Q2,14 1,13" fill="none" stroke="${col}" stroke-width="1.2"/>
    <line x1="2" y1="6" x2="3" y2="10" stroke="${col}" stroke-width="1"/>
    <ellipse cx="5" cy="1" rx="5" ry="4" fill="#555" stroke="${col}" stroke-width="1.2"/>
    <line x1="2" y1="-2" x2="2" y2="4" stroke="#888" stroke-width=".6"/>
    <line x1="5" y1="-3" x2="5" y2="5" stroke="#888" stroke-width=".6"/>
    <line x1="8" y1="-2" x2="8" y2="4" stroke="#888" stroke-width=".6"/>
    <rect x="8" y="-2" width="22" height="4" rx="1.5" fill="#333" stroke="${col}" stroke-width="1.2"/>
    <line x1="9" y1="-2" x2="30" y2="-2" stroke="#555" stroke-width=".8"/>
    <rect x="28" y="-3" width="4" height="6" rx="1" fill="#222" stroke="${col}" stroke-width="1"/>
    <rect x="-1" y="-6" width="4" height="5" rx="1" fill="#444" stroke="${col}" stroke-width="1"/>`;
}

// ── ENEMY TYPES ────────────────────────────────────────
const ENEMY_TYPES=[
  {type:"slow", bounty:100,label:"$100",hp:1,delay:()=>2200+Math.random()*900,yPct:[55,60,65],taunt:600},
  {type:"fast", bounty:250,label:"$250",hp:1,delay:()=>680+Math.random()*300, yPct:[48,53,58],taunt:280},
  {type:"elite",bounty:500,label:"$500",hp:2,delay:()=>1300+Math.random()*500,yPct:[43,50,58],taunt:450},
  {type:"boss", bounty:1500,label:"$1500",hp:4,delay:()=>2600+Math.random()*700,yPct:[42,50],taunt:700,boss:true},
];
function chooseType(){
  const r=Math.random();
  if(round>=5&&r<.06) return ENEMY_TYPES[3];
  if(score>300&&r<.14) return ENEMY_TYPES[2];
  if(score>80&&r<.38)  return ENEMY_TYPES[1];
  return ENEMY_TYPES[0];
}
function spawnDelay(){return Math.max(300,980-score*.34-round*34);}

// ── CREATE ENEMY ───────────────────────────────────────
function createEnemy(){
  if(gameOver||inShop) return;
  const cfg=chooseType();
  if(cfg.boss) showBossWarn();
  const side=Math.random()<.5?"left":"right";
  const col=cfg.type==="boss"?"#ff6600":cfg.type==="elite"?"#9933cc":cfg.type==="fast"?"#dd3333":"#cc8833";

  const armLine=side==="left"
    ?`<line x1="40" y1="35" x2="59" y2="48" stroke="${col}" stroke-width="3"/>`
    :`<line x1="40" y1="35" x2="21" y2="48" stroke="${col}" stroke-width="3"/>`;
  const gunG=side==="left"
    ?`<g class="gun" transform="translate(59,48)">${gunInner(col)}</g>`
    :`<g class="gun" transform="translate(21,48) scale(-1,1)">${gunInner(col)}</g>`;

  const e=document.createElement("div");
  e.className=`stick enemy-${cfg.type}`;
  Object.assign(e.dataset,{type:cfg.type,hp:cfg.hp,maxHp:cfg.hp,spawnTime:Date.now()});

  e.innerHTML=`
    <div class="bountyTag">${cfg.label}</div>
    ${cfg.hp>1?`<div class="healthBar"><div class="healthFill"></div></div>`:""}
    <svg viewBox="0 0 80 100">
      <circle cx="40" cy="14" r="${cfg.boss?12:10}" stroke="${col}" stroke-width="3" fill="none"/>
      <line x1="40" y1="24" x2="40" y2="62" stroke="${col}" stroke-width="3"/>
      <g class="arm" style="transform-origin:40px 35px">${armLine}${gunG}</g>
      <line x1="40" y1="35" x2="${side==="left"?21:59}" y2="50" stroke="${col}" stroke-width="3"/>
      <line x1="40" y1="62" x2="25" y2="92" stroke="${col}" stroke-width="3"/>
      <line x1="40" y1="62" x2="55" y2="92" stroke="${col}" stroke-width="3"/>
    </svg>`;

  const yPct=cfg.yPct[Math.floor(Math.random()*cfg.yPct.length)];
  e.style.top=yPct+"%";
  e.style.left=side==="left"?"0":(window.innerWidth-90)+"px";
  e.classList.add(side==="left"?"sil":"sir");
  document.body.appendChild(e);
  activeEnemies.add(e);

  // Taunt
  const tauntT=setTimeout(()=>{
    if(!document.body.contains(e)) return;
    const tb=document.createElement("div"); tb.className="taunt";
    tb.textContent=TAUNTS[Math.floor(Math.random()*TAUNTS.length)];
    e.appendChild(tb); setTimeout(()=>tb.remove(),2200);
  },cfg.taunt);

  // Track
  const track=setInterval(()=>{
    if(!document.body.contains(e)){clearInterval(track);return;}
    const arm=e.querySelector(".arm");
    if(arm) smoothRotate(arm,angleTo(center(e),center(player)));
    aimAtClosest();
  },30);

  // Click
  e.addEventListener("click",ev=>{
    if(gameOver||e.dataset.dying) return;
    ev.stopPropagation(); AC.resume();
    const ep=center(e), pp=center(player);
    smoothRotate(aimArm,angleTo(pp,ep));
    if(upgrades.dual&&streak>=10) smoothRotate(aimArm2,angleTo(pp,ep));
    player.classList.add("shooting"); setTimeout(()=>player.classList.remove("shooting"),250);
    playSound("shot"); cursor.classList.add("fired"); setTimeout(()=>cursor.classList.remove("fired"),140);
    flash("white",.28,100); screenShake(3,100); spawnMuzzle(pp.x,pp.y);
    let hp=parseInt(e.dataset.hp)-1; e.dataset.hp=hp;
    const hf=e.querySelector(".healthFill");
    if(hf) hf.style.width=(hp/parseInt(e.dataset.maxHp)*100)+"%";
    if(hp>0){spawnDust(ep.x,ep.y,5,col);rfloat("HIT!",ep.x,ep.y-20);return;}
    clearTimeout(tauntT);
    killEnemy(e,ev,cfg,track);
  });

  // Enemy shoots
  let d=cfg.delay(); if(bulletTimeActive) d*=2.5;
  const st=setTimeout(()=>{
    if(gameOver||!document.body.contains(e)||e.dataset.dying) return;
    const ep=center(e);
    e.classList.add("shooting"); spawnMuzzle(ep.x,ep.y); playSound("shot");
    clearInterval(track);
    setTimeout(()=>takeHit(ep.x,ep.y),80);
  },d);
  e.dataset.timeout=st;
}

// ── KILL ───────────────────────────────────────────────
function killEnemy(e,ev,cfg,track){
  clearInterval(track); clearTimeout(parseInt(e.dataset.timeout));
  e.dataset.dying="1"; activeEnemies.delete(e);
  const ep=center(e);
  const reaction=Date.now()-parseInt(e.dataset.spawnTime);
  const bBoost=upgrades.bounty?1.5:1;
  let pts=Math.floor(cfg.bounty*multiplier*bBoost*Math.max(.5,2000/Math.max(reaction,200)));
  const rect=e.getBoundingClientRect();
  const isHead=ev&&ev.clientY<rect.top+rect.height*.3;
  if(isHead){
    pts=Math.floor(pts*3);
    playSound("headshot");
    callout("HEADSHOT!",ep.x,ep.y-20,{size:"38px",color:"#ff4400",glow:"#ff2200"});
    spawnDust(ep.x,ep.y,18,"#cc0000");
    flash("white",.55,80); screenShake(8,200);
  } else {
    playSound("shot"); spawnDust(ep.x,ep.y,8); screenShake(3,100);
  }
  paintBlood(ep.x,ep.y);
  score+=pts; scoreNum.textContent=score;
  addXP(Math.floor(pts/10));
  addStreak(ep.x,ep.y-50);
  rfloat(`+${pts} (${reaction}ms)`,ep.x,ep.y-10);
  e.classList.add("dead"); setTimeout(()=>e.remove(),500);
  killsThisRound++; checkRound();
  if(reaction<250&&upgrades.time&&!btCooldown) triggerBulletTime();
  restartSpawnInterval();
}

// ── AIM ────────────────────────────────────────────────
function aimAtClosest(){
  if(gameOver) return;
  let closest=null,minD=Infinity;
  const pp=center(player);
  activeEnemies.forEach(e=>{
    if(!document.body.contains(e)) return;
    const ep=center(e), d=Math.hypot(ep.x-pp.x,ep.y-pp.y);
    if(d<minD){minD=d;closest=e;}
  });
  if(closest){
    const ep=center(closest);
    smoothRotate(aimArm,angleTo(pp,ep));
    if(upgrades.dual&&streak>=10) smoothRotate(aimArm2,angleTo(pp,ep));
  }
}

// ── ROUNDS / SHOP ──────────────────────────────────────
function checkRound(){
  if(killsThisRound>=5*round){
    round++;
    waveDisplay.textContent=`ROUND ${round}`;
    callout(`ROUND ${round}`,window.innerWidth/2,window.innerHeight/2,{size:"60px",color:"#ffd700",glow:"#ffaa00"});
    screenShake(6,300);
    clearInterval(spawnInterval); spawnInterval=null;
    if(round%3===1) setTimeout(openShop,900);
    else restartSpawnInterval();
  }
}

// ── SHOP ───────────────────────────────────────────────
const SHOP_ITEMS=[
  {id:"extra_life",name:"Doc's Remedy",   desc:"Restore 1 life",       icon:"❤", cost:300,action:()=>{lives=Math.min(3,lives+1);renderHearts();}},
  {id:"dual",      name:"Dual Wield",     desc:"Two guns at 10x streak",icon:"🔫",cost:600,action:()=>{upgrades.dual=true;document.getElementById("u-dual").classList.add("on");}},
  {id:"shield",    name:"Iron Will",      desc:"+1 max life",           icon:"🛡",cost:500,action:()=>{upgrades.shield=true;lives=Math.min(4,lives+1);renderHearts();document.getElementById("u-shield").classList.add("on");}},
  {id:"time",      name:"Bullet Time",    desc:"Lightning draws = slow-mo",icon:"⏱",cost:700,action:()=>{upgrades.time=true;document.getElementById("u-time").classList.add("on");}},
  {id:"bounty",    name:"Gold Rush",      desc:"1.5× all bounties",     icon:"💰",cost:800,action:()=>{upgrades.bounty=true;document.getElementById("u-bounty").classList.add("on");}},
  {id:"keep",      name:"Lucky Horseshoe",desc:"Keep 3 streak on hit",  icon:"🧲",cost:400,action:()=>{upgrades.streakKeep=true;}},
];

function openShop(){
  inShop=true; clearInterval(spawnInterval); spawnInterval=null;
  playSound("shop"); shopGoldAmt.textContent=score;
  shopItemsEl.innerHTML="";
  SHOP_ITEMS.forEach(item=>{
    const div=document.createElement("div");
    const bought=boughtItems.has(item.id);
    div.className="shopItem"+(bought?" bought":score<item.cost?" unaffordable":"");
    div.innerHTML=`<div class="iName">${item.icon} ${item.name}</div><div class="iDesc">${item.desc}</div><div class="iCost">$${item.cost}</div>`;
    div.onclick=()=>{
      if(bought||score<item.cost) return;
      score-=item.cost; scoreNum.textContent=score; shopGoldAmt.textContent=score;
      boughtItems.add(item.id); item.action(); div.classList.add("bought"); playSound("levelup");
    };
    shopItemsEl.appendChild(div);
  });
  shopEl.classList.add("show");
}
function closeShop(){
  inShop=false; shopEl.classList.remove("show");
  showDraw(()=>restartSpawnInterval());
}

function showBossWarn(){
  bossWarn.classList.add("flash"); playSound("boss");
  setTimeout(()=>bossWarn.classList.remove("flash"),1500);
}

// ── TAKE HIT ───────────────────────────────────────────
function takeHit(){
  if(gameOver) return;
  if(upgrades.streakKeep&&streak>3) streak=Math.max(3,streak-3), streakNum.textContent=streak;
  else resetCombo();
  lives--; renderHearts();
  playSound("hurt"); flash("red",.72,380); screenShake(14,460);
  const pp=center(player);
  spawnDust(pp.x,pp.y,12,"#cc0000"); paintBlood(pp.x,pp.y+20);
  if(lives<=0) doGameOver();
}

// ── GAME OVER ──────────────────────────────────────────
function doGameOver(){
  gameOver=true; clearInterval(spawnInterval);
  player.classList.add("playerDead"); playSound("die");
  flash("red",.9,700); screenShake(16,700);
  activeEnemies.forEach(e=>e.remove()); activeEnemies.clear();
  setTimeout(()=>{
    document.getElementById("goFinal").textContent=score;
    document.getElementById("goRank").textContent=RANKS[rankIdx].name;
    document.getElementById("goStreak").textContent=`Best Streak: ${bestStreak}`;
    updateLB(); gameOverEl.style.display="block";
  },900);
}
function updateLB(){
  let s=JSON.parse(localStorage.getItem("qdS3")||"[]");
  s.push(score); s.sort((a,b)=>b-a); s=s.slice(0,5);
  localStorage.setItem("qdS3",JSON.stringify(s));
  document.getElementById("lbList").innerHTML=s.map((v,i)=>`<span style="color:${i===0?"#d4a017":"inherit"}">${i===0?"★":"  "} ${v}</span>`).join("<br>");
}

// ── DAILY ──────────────────────────────────────────────
(()=>{
  const today=new Date().toISOString().slice(0,10);
  const badge=document.getElementById("dailyBadge");
  if(localStorage.getItem("qdDD")===today){
    badge.textContent=`📅 DAILY BEST: ${localStorage.getItem("qdDS")||0}`;
  }
  window.addEventListener("beforeunload",()=>{
    const prev=parseInt(localStorage.getItem("qdDS")||0);
    if(localStorage.getItem("qdDD")!==today||score>prev){
      localStorage.setItem("qdDD",today); localStorage.setItem("qdDS",score);
    }
  });
})();

// ── SPAWN INTERVAL ─────────────────────────────────────
function restartSpawnInterval(){
  clearInterval(spawnInterval);
  spawnInterval=setInterval(createEnemy,spawnDelay());
}

// ── TOUCH SUPPORT ──────────────────────────────────────
document.addEventListener("touchstart", e => {
  AC.resume();
  e.preventDefault();
  const touch = e.changedTouches[0];
  cursor.style.left = touch.clientX + "px";
  cursor.style.top  = touch.clientY + "px";
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el) {
    const evt = new MouseEvent("click", {
      bubbles:true, cancelable:true,
      clientX: touch.clientX, clientY: touch.clientY,
      offsetX: touch.clientX - el.getBoundingClientRect().left,
      offsetY: touch.clientY - el.getBoundingClientRect().top,
    });
    el.dispatchEvent(evt);
  }
}, { passive: false });

document.addEventListener("touchmove", e => {
  e.preventDefault();
  const touch = e.changedTouches[0];
  cursor.style.left = touch.clientX + "px";
  cursor.style.top  = touch.clientY + "px";
}, { passive: false });

// ── SERVICE WORKER ─────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// ── START ──────────────────────────────────────────────
function restart(){location.reload();}
document.body.addEventListener("click",()=>AC.resume(),{once:true});
showDraw(()=>{restartSpawnInterval();startMusic();});
</script>
</body>
